<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiyana Romance - Chapter 2</title>
    <style>
        /* ใช้ Style เดิมจาก Version 1.0 เพื่อความต่อเนื่อง */
        :root { --pink-main: #ff8fa3; --pink-light: #ffcad4; --blue-sky: #ade8f4; --glass: rgba(255, 255, 255, 0.98); --text: #4a4a4a; }
        body { background: linear-gradient(135deg, var(--pink-light) 0%, var(--blue-sky) 100%); font-family: 'Kanit', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-window { width: 1080px; height: 780px; background: white; border-radius: 40px; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.25); border: 10px solid white; overflow: hidden; }
        #story-box { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 94%; height: 320px; background: var(--glass); border-radius: 35px; border: 4px solid #ffcada; padding: 45px; box-sizing: border-box; }
        #name-label { position: absolute; top: -25px; left: 50px; background: var(--pink-main); color: white; padding: 10px 45px; border-radius: 20px; font-weight: bold; font-size: 1.4rem; }
        #text-content { font-size: 1.2rem; line-height: 1.8; height: 180px; overflow-y: auto; text-align: left; white-space: pre-wrap; }
        #btn-next { position: absolute; bottom: 25px; right: 45px; background: #3498db; color: white; border: none; padding: 10px 35px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .top-nav { position: absolute; top: 25px; right: 35px; display: flex; gap: 10px; z-index: 150; }
        .btn-nav { padding: 8px 18px; font-size: 0.8rem; background: #adb5bd; color: white; border-radius: 12px; border: none; cursor: pointer; }
        #choice-area { position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%); display: none; flex-direction: column; gap: 15px; z-index: 200; width: 50%; }
        .btn-main { padding: 15px 0; width: 100%; font-size: 1.2rem; cursor: pointer; border-radius: 50px; border: none; background: var(--pink-main); color: white; font-weight: bold; box-shadow: 0 5px 0 #e67387; }
    </style>
</head>
<body>

<div id="game-window">
    <div class="top-nav">
        <button class="btn-nav" style="background:#81c784;" onclick="saveCh2()">SAVE</button>
        <button class="btn-nav" onclick="location.href='index.html'">MENU</button>
    </div>

    <div style="width:100%; height:100%; display:flex; justify-content:center; align-items:center; font-size:30rem; opacity:0.03; pointer-events:none;">🎮</div>

    <div id="choice-area"></div>
    <div id="story-box">
        <div id="name-label"></div>
        <div id="text-content"></div>
        <button id="btn-next" onclick="doNext()">อ่านต่อ ▶</button>
    </div>
</div>

<script>
    let pName = "รุ่นพี่"; 
    let step = 0;
    let love = 0;

    // โหลดชื่อจากเซฟเก่า
    const savedData = JSON.parse(localStorage.getItem('kiyana_v1_0'));
    if(savedData) pName = savedData.pName;

    const story = [
        { label: "สถานการณ์", content: "เช้าวันใหม่ที่โรงเรียน Yoyogi Academy... ข่าวลือเรื่องรุ่นพี่ 2-B กับ Kiyana เริ่มแพร่สะพัด" },
        { label: "บรรยากาศ", content: "คุณเดินผ่านห้อง 1-B (ห้องข้างๆ ของ Kiyana) และได้ยินเสียงซุบซิบดังออกมา" },
        { label: "นักเรียน 1-B", content: "พวกเธอ! ดูนั่นดิ รุ่นพี่คนนั้นไงที่ลือกันว่าจีบ Kiyana ยัยเด็กติดเกมห้อง A น่ะ!" },
        { label: pName, content: "(ผมแสร้งทำเป็นไม่ได้ยิน แต่ในใจกลับประหม่านิดๆ แฮะ)" },
        { label: "สถานการณ์", content: "เมื่อคุณมาถึงหน้าห้อง 1-A เพื่อนสาว 4 คนของเธอก็ยืนดักรออยู่แล้ว" },
        { label: "Yuki", content: "แหมๆ รุ่นพี่คะ! วันนี้จะมารับไปเดทหรือเปล่าน้า~?" },
        { label: "Hana", content: "ห้อง 1-B ลือกันให้แซ่ดเลยนะว่าพี่ห่วงยัยนั่นจนออกนอกหน้า!" },
        { label: "สถานการณ์", content: "Kiyana เดินออกมาจากห้องพอดี เธอเห็นคุณโดนรุมแซวเลยหน้าแดงฉ่า" },
        { label: "Kiyana", content: "หยุดพูดเดี๋ยวนี้เลยนะพวกบ้า! รุ่นพี่คะ... อย่าไปฟังพวกนั้นนะ!" },
        { label: "ระบบ", content: "Kiyana ดูอายมาก คุณจะปกป้องเธออย่างไร?", 
          choice: true, options: [{text: "จับมือเธอแล้วเดินเลี่ยงออกมา", val: 10}, {text: "บอกเพื่อนๆ ว่า 'ก็พี่ชอบเธอนี่นา'", val: 15}] },
        { label: "Kiyana", content: "Kiyana: \"(เงียบกริบ หน้าแดงยิ่งกว่าเดิม) ...รุ่นพี่... พะ..พูดอะไรออกมาคะ!\"" },
        { label: "สถานการณ์", content: "คุณพาเธอเดินออกมาจนถึงที่สงบหลังโรงเรียน" },
        { label: pName, content: "พี่ขอโทษนะที่ทำให้โดนแซว... แต่พี่อยากชวนเราไปที่หนึ่งหลังเลิกเรียน" },
        { label: "Kiyana", content: "ไปไหนคะ?... ถ้าไม่ใช่ร้านเกม หนูไม่ไปนะ!" },
        { label: pName, content: "ไป 'Game Center' ที่ชิบูย่ากันไหม? พี่ได้คูปองเล่นฟรีมาน่ะ" },
        { label: "Kiyana", content: "ห๊ะ! ร้านเกมเปิดใหม่ตรงชิบูย่านั่นเหรอ!? ...ก..ก็ได้ค่ะ เห็นแก่คูปองนะ!" },
        { label: "สถานการณ์", content: "ตัดภาพมาที่หลังเลิกเรียน... คุณและเธอเดินอยู่ท่ามกลางฝูงชนในชิบูย่า" },
        { label: "บรรยากาศ", content: "แสงไฟจากตึกต่างๆ เริ่มสว่างขึ้น Kiyana ดูตื่นเต้นแต่ก็พยายามเก็บอาการ" },
        { label: "Kiyana", content: "คนเยอะชะมัดเลย... รุ่นพี่คะ... อย่าเดินห่างหนูนะ เดี๋ยวหลง (เธอแอบดึงชายเสื้อคุณ)" },
        { label: "สถานการณ์", content: "คุณทั้งคู่มาถึงร้านเกมขนาดใหญ่ เสียงดนตรีและแสงสีทำให้ Kiyana ตาลุกวาว" },
        { label: "Kiyana", content: "ว้าว! ตู้เกมรุ่นใหม่ล่าสุดเลย! รุ่นพี่! มานี่เร็ว มาแข่งเกมต่อสู้กับหนู!" },
        { label: "การแข่งขัน", content: "พวกคุณเล่นเกมด้วยกันอย่างสนุกสนาน ผลปรากฏว่า Kiyana ชนะขาดลอยทุกตา" },
        { label: "Kiyana", content: "ฮิฮิ! ฝีมือกากจังนะรุ่นพี่ 2-B แบบนี้ต้องโดนลงโทษนะคะ!" },
        { label: pName, content: "ยอมแล้วๆ... อยากให้พี่ทำอะไรล่ะ?" },
        { label: "Kiyana", content: "ไปคีบตุ๊กตาตัวนั้นให้หนูหน่อยสิคะ... ตัวแมวสีม่วงนั่นน่ะ!" },
        { label: "สถานการณ์", content: "คุณพยายามคีบอยู่หลายครั้งจนในที่สุดก็ทำสำเร็จ!" },
        { label: "Kiyana", content: "ว้าว! ได้จริงๆ ด้วย! (เธอกอดตุ๊กตาแน่นแล้วยิ้มกว้างออกมา)" },
        { label: "ความรู้สึก", content: "รอยยิ้มของเธอในตอนนั้น... มันทำให้โลกทั้งใบหยุดหมุนไปชั่วขณะ" },
        { label: pName, content: "Kiyana จัง... วันนี้ขอบคุณนะที่ยอมมาด้วยกัน" },
        { label: "Kiyana", content: "ไม่เป็นไรค่ะ... หนูเองก็... สนุกเหมือนกัน..." },
        { label: "สถานการณ์", content: "คุณทั้งคู่เดินออกจากร้านเกมมาถึงมุมถนนที่ค่อนข้างเงียบ" },
        { label: "บรรยากาศ", content: "ลมเย็นๆ พัดผ่านมา Kiyana ยืนมองตุ๊กตาในอ้อมกอดด้วยรอยยิ้ม" },
        { label: pName, content: "(จังหวะนี้แหละ... ร่างกายมันขยับไปเอง)" },
        { label: "การกระทำ", content: "คุณโน้มตัวลงไปแล้ว <span style='color:#ff4d6d;font-weight:bold;'>หอมแก้มเธอเบาๆ</span> หนึ่งที" },
        { label: "Kiyana", content: "!!! (Kiyana ตัวแข็งทื่อ ตุ๊กตาเกือบหลุดจากมือ หน้าเธอแดงจนเหมือนจะระเบิด)" },
        { label: "Kiyana", content: "ร..ร..รุ่นพี่!!! ทำอะไรคะเนี่ย!? นี่มันกลางที่สาธารณะนะ!" },
        { label: pName, content: "ก็... รางวัลที่ชนะพี่ไงครับ" },
        { label: "Kiyana", content: "คนฉวยโอกาส! นิสัยเสีย! รุ่นพี่บ้า! (เธอตะโกนใส่คุณทั้งที่หน้ายังแดงซ่าน)" },
        { label: "ความลับ", content: "Kiyana: (หัวใจจะวายตายอยู่แล้ว... รุ่นพี่บ้า... ทำไมต้องเท่ขนาดนี้ด้วยนะ)" },
        { label: "สถานการณ์", content: "เธอรีบเดินนำหน้าคุณไปอย่างรวดเร็วเพื่อซ่อนใบหน้าที่แดงฉ่า" },
        { label: pName, content: "รอพี่ด้วยสิ Kiyana จัง!" },
        { label: "Kiyana", content: "ไม่รอค่ะ! คนลามก! (แต่เธอกลับค่อยๆ ชะลอความเร็วลงเพื่อให้คุณเดินตามทัน)" },
        { label: "บรรยากาศ", content: "ทางเดินกลับบ้านวันนี้ดูสั้นกว่าปกติอย่างบอกไม่ถูก" },
        { label: "สถานการณ์", content: "จนมาถึงหน้าสถานีรถไฟฟ้าที่จะต้องแยกกัน" },
        { label: "Kiyana", content: "ถึงแล้วค่ะ... ขอบคุณสำหรับตุ๊กตานะคะ... และก็... เรื่องเมื่อกี้..." },
        { label: "Kiyana", content: "ห้ามไปบอกใครเด็ดขาดเลยนะ! ไม่งั้นหนูโกรธจริงๆ ด้วย!" },
        { label: pName, content: "รับทราบครับผม" },
        { label: "Kiyana", content: "ฝันดีนะคะ... รุ่นพี่ (เธอกระซิบบอกเบาๆ ก่อนจะวิ่งเข้าสถานีไป)" },
        { label: "สถานการณ์", content: "คุณยืนมองแผ่นหลังของเธอหายไปในฝูงชน พร้อมกับหัวใจที่เต้นรัว" },
        { label: "บทสรุป", content: "Chapter 2 สำเร็จ! ความสัมพันธ์ขยับขึ้นไปอีกขั้นแล้ว! [Success]" }
    ];

    function renderS() {
        const d = story[step];
        document.getElementById('name-label').innerText = d.label;
        document.getElementById('text-content').innerHTML = d.content;
        const nxt = document.getElementById('btn-next');
        const area = document.getElementById('choice-area');
        if (d.choice) {
            nxt.style.display = 'none'; area.style.display = 'flex'; area.innerHTML = '';
            d.options.forEach(opt => {
                const b = document.createElement('button'); b.className = 'btn-main'; b.innerText = opt.text;
                b.onclick = () => { love += opt.val; step++; area.style.display = 'none'; nxt.style.display = 'block'; renderS(); };
                area.appendChild(b);
            });
        }
        if (step === story.length - 1) { saveCh2(true); }
    }

    function doNext() { if (step < story.length - 1) { step++; renderS(); } }

    function saveCh2(isEnd = false) {
        let s = JSON.parse(localStorage.getItem('kiyana_v1_0')) || {pName: pName, completed: []};
        if(isEnd && !s.completed.includes(2)) s.completed.push(2);
        localStorage.setItem('kiyana_v1_0', JSON.stringify(s));
        if(!isEnd) alert("บันทึก Ch2 สำเร็จ!");
    }

    window.onload = renderS;
</script>
</body>
</html>
